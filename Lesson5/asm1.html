<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: relative;
            max-width: 100%;
            overflow: hidden; 
        }

        .background {
            display: block;
            width: 100%;
            height: auto;
        }

        div.absolute {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            
            width: 350px;
            padding: 20px; /* Dùng padding thay vì set height cứng để nội dung tự co giãn */
            padding-bottom: 100px;
            background-color: rgba(255, 255, 255, 0.6); 
            
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 10px; 
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(14, 18, 67, 0.37); 
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="background" src="../imgs/maxresdefault.jpg" alt="an image">
        <div class="absolute">
            <h2>Blurred Background</h2>
            <p>By me</p>
        </div>
    </div>
</body>
</html>
