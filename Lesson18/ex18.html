<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>swapNumbers</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="ex18.css">
</head>
<body>
    <div class="container">
        <h2>Fibonacci</h2>
        <input type="number" id="fibonacciInput" placeholder="Enter a number">
        <button class="ios-btn" onclick="generateFibonacci()">Check</button>
        <p id="fibonacciResult"></p>
    </div>

    <div class="container">
        <h2>Inverse Number</h2>
        <input type="number" id="inverseInput" placeholder="Enter a number">
        <button class="ios-btn" onclick="inverseNumber()">Check</button>
        <p id="inverseResult"></p>
    </div>

    <div class="container">
        <h2>Convert Number to Words</h2>
        <input type="number" id="convertInput" placeholder="Enter a number">
        <button class="ios-btn" onclick="convertNumberToWords()">Convert</button>
        <p id="convertResult"></p>
    </div>

    <script src="ex18script.js"></script>
</body>
</html>
