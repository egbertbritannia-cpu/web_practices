<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Asap:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Contact Form</title>
    <link rel="stylesheet" href="../Lesson9/css/asm3style.css">
</head>
<body> 
    <div class="contact-form">

        <h1>Drop Us a Line</h1>
        <p>Reach out to us from our contact form and we will get back to you shortly</p>

        <form class="contact-input">

            <div class="input">
                <input type="text" placeholder=" " required>
                <label>First Name *</label>
            </div> 

            <div class="input">
                <input type="text" name="lastName" placeholder="">
                <label>Last Name *</label>
            </div>

            <div class="input">
                <input type="email" name="email" placeholder="">
                <label>Email *</label>
            </div>

            <div class="input">
                <input type="text" name="department" placeholder="">
                <label>Sales *</label>
            </div>

            <div class="input message">
                <textarea name="message" placeholder=""></textarea>
                <label>Message *</label>
            </div>

            <button class="btn">Send message</button>

        </form>

    </div>
</body>
</html>
