<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>swapNumbers</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="ex20.css">
</head>
<body>
    <div class="container glass">
        <h2>1. Set Intersection</h2>

        <label>Array 1</label>
        <input class="glass" type="text" id="intersection-a1" placeholder="Enter An Array Of Numbers">

        <label>Array 2</label>
        <input class="glass" type="text" id="intersection-a2" placeholder="Enter An Array Of Numbers">
        
        <button id="btn-intersection" class="glass">Intersection</button>
        <p id="output-intersection"></p>
    </div>

    <div class="container glass">
        <h2>2. Flatten Array</h2>

        <label>Array</label>
        <input class="glass" type="text" id="flatten-input" placeholder="Enter An Array Of Numbers">

        <button id="btn-flatten" class="glass">Flatten</button>
        <p id="output-flatten"></p>
    </div>

    <div class="container glass">
        <h2>3. Concat Array</h2>

        <label>Array 1</label>
        <input class="glass"     type="text" id="concat-a1" placeholder="Enter An Array Of Numbers">

        <label>Array 2</label>
        <input class="glass" type="text" id="concat-a2" placeholder="Enter An Array Of Numbers ">

        <button id="btn-concat">Concat</button>
        <p id="output-concat"></p>
    </div>
    <script src="ex20script.js"></script>
</body>
</html>
