<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .custom-list-title {
            text-decoration: underline;
            color: #1a2a44;
            margin-bottom: 15px;
            font-size: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        li::before {
            content: '😊'; 
            margin-right: 15px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <ul>
        <li>John</li>
        <li>Michael</li>
        <li>Simpson</li>
        <li>Johnson</li>
    </ul>
</body>
</html>
