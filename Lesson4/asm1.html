<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        footer {
            background-color: #2d3e50; /* Màu nền tối của banner */
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
            width: 45%;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        h1 span {
            color: #ff9900; /* Màu cam cho chữ "Earn income" */
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 25px;
            max-width: 600px;
        }

        input {
            padding: 12px 15px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            width: 300px;
        }

        button {
            background-color: #f1d302; /* Màu vàng của nút */
            color: #333;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: orange;
            color: white;
        }

        input::placeholder:hover {
            color: #999;
            color: #f1d302;
        }

        .orange {
            color: #ff9900;
        }
    </style>
</head>
<body>
    <footer>
        <h1><span class="orange">Earn income with</span> your CSS skills</h1>
        <p>Sign up and we'll send you the best freelance opportunities straight to your inbox. </p>
        <p>We're building the largest self-service freelancing marketplace for people like you.</p>
        <input placeholder="Email address">
        <button>Send Me Opportunities</button>
    </footer>
</body>
</html>
