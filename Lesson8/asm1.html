<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Lesson6/css/asm1style.css">
</head>
<body>
    <div class="container">

        <h1>Hey there</h1>
        <p>
            <span class="highlight">We'd like to hear from you.</span> Send us your
            message or just say hy with our contact form or directly via phone, we
            love to chart.
        </p>

        <form action="">

            <div class="input-group" data-title="Enter your name">
                <div class="icon "><i class="fa-solid fa-user"></i></div>
                <input type="text" placeholder="Your name" required />
                <i class="fa-solid fa-xmark clear-icon item-around "></i>
            </div>

            <div class="input-group" data-title="Enter your email">
                <div class="icon "><i class="fa-solid fa-envelope"></i></div>
                <input type="email" placeholder="your@domain.com" required />
                <i class="fa-solid fa-xmark clear-icon item-around "></i>
            </div>

            <div class="input-group" data-title="Enter your phone">
                <div class="icon ">
                    <i class="fa-solid fa-mobile-screen-button"></i>
                </div>
                <input type="number" placeholder="+44 00 123" />
            </div>

            <div class="input-group" data-title="Choose your selection">
                <div class="icon "><i class="fa-solid fa-book"></i></div>
                <select>
                    <option value="">Subject</option>
                    <option value="1">English</option>
                    <option value="2">Math</option>
                </select>
                <i class="fa-solid fa-sort select-icon "></i>
            </div>
            
            <div class="input-group textarea-group" data-title="Enter your message">
                <div class="icon "><i class="fa-solid fa-message"></i></div>
                <textarea placeholder="Message" required></textarea>
                <i class="fa-solid fa-xmark clear-icon item-around "></i>
            </div>

            <div class="footer">
                <div class="checkbox-container">
                    <label for=""
                    ><input type="checkbox" checked />Send me a copy of this
                    message</label>
                </div>
                <button type="submit" class="btn">SEND</button>
            </div>
        </form>
    </div>
</body>
</html>
