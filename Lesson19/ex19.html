<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>swapNumbers</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="ex19.css">
</head>
<body>
    <div class="container-container">
        <div class="container">
            <h2>Bài 01 - Max / Min in Array</h2>
            <input type="text" id="array1" placeholder="Enter an array, ví dụ: 5,3,8,1">
            <button onclick="findMinMax()">Check</button>
            <p id="result1"></p>
        </div>

        <div class="container">
            <h2>Bài 02 - Average of prime Numbers</h2>
            <input type="text" id="array2" placeholder="Enter an array">
            <button onclick="avgPrime()">Check</button>
            <p id="result2"></p>
        </div>

        <div class="container">
            <h2>Bài 03 - filter same numbers</h2>
            <input type="text" id="array3" placeholder="Enter an array">
            <button onclick="removeDuplicate()">Check</button>
            <p id="result3"></p>
        </div>

        <div class="container">
            <h2>Bài 04 - Sort + Insert</h2>
            <input type="text" id="array4" placeholder="Enter an array">
            <input type="number" id="element" placeholder="Enter insert number">
            <button onclick="insertNumber()">Check</button>
            <p id="result4"></p>
        </div>
    </div>
    <script src="ex19script.js"></script>
</body>
</html>
