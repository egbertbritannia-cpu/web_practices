<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day7</title>
    <link rel="stylesheet" href="../Lesson7/css/asm2style.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
    <section id="">
        <div class="container">
            <div class="login-form-left">
                <h2><span class="logo">JL</span> Just Log</h2>
                <p class="introduce">
                    Lorem ipsum dolor sit amet, consectetur adipisicing elit. Obcaecati
                    itaque quam molestias expedita deleniti exercitationem magni, nisi
                </p>
                <button class="btn-readmore">Read More</button>
                <div class="infor">
                    <i class="fa-brands fa-facebook-f"></i>
                    <i class="fa-brands fa-twitter"></i>
                    <i class="fa-brands fa-google-plus-g"></i>
                    <i class="fa-brands fa-linkedin-in"></i>
                </div>
            </div>
            <div class="login-form-right">
                <h2>Login to <span><u>your</u> account</span></h2>
                <div class="login-account">
                    <form action="" method="post" class="login">
                    <input type="email" placeholder="Email Address" required />
                    <br />
                    <input type="password" placeholder="Password" required />
                    </form>
                </div>
                <div class="checkbox">
                    <div class="checkbox-left">
                        <label> <input type="checkbox" /> Remember me </label> 
                    </div>
                    <div class="checkbox-right">
                        <a href="#">Forgot Password</a>
                    </div>
                </div>
                <button class="btn-login">LOGIN</button>
                <div class="register">
                    <p>Don't have an acount? Register here</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
